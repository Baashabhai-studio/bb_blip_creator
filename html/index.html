<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BB Blip Creator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app" class="hidden">
        <div class="panel">
            <!-- Header -->
            <header class="panel__header">
                <div class="brand">
                    <div class="brand__mark">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
                            <path d="M12 2c-4.2 0-7.5 3.2-7.5 7.3 0 5 6.2 11.7 7 12.5.3.3.7.3 1 0 .8-.8 7-7.5 7-12.5C19.5 5.2 16.2 2 12 2z"
                                  stroke="currentColor" stroke-width="1.8"/>
                            <circle cx="12" cy="9.4" r="2.6" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                    </div>
                    <div class="brand__text">
                        <h1 id="title">BB Blip Creator</h1>
                        <span id="subtitle">by Baasha Bhai</span>
                    </div>
                </div>
                <div class="header__actions">
                    <span id="adminBadge" class="badge badge--admin">ADMIN</span>
                    <button id="closeBtn" class="icon-btn" title="Close (ESC)">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                </div>
            </header>

            <!-- Tabs -->
            <nav class="tabs">
                <button class="tab tab--active" data-tab="create">Create</button>
                <button class="tab" data-tab="manage">Manage <span id="manageCount" class="pill">0</span></button>
            </nav>

            <div class="panel__body">
                <!-- ───────── CREATE TAB ───────── -->
                <section id="tab-create" class="tabpane tabpane--active">
                    <div class="create-grid">
                        <!-- Left: form -->
                        <div class="form-col">
                            <div class="field">
                                <label>Label</label>
                                <input id="f-label" type="text" maxlength="50" placeholder="e.g. Pacific Bank" />
                            </div>

                            <div class="field">
                                <label>Location</label>
                                <div class="coords">
                                    <div class="coord"><span>X</span><input id="f-x" type="number" step="0.01" /></div>
                                    <div class="coord"><span>Y</span><input id="f-y" type="number" step="0.01" /></div>
                                    <div class="coord"><span>Z</span><input id="f-z" type="number" step="0.01" /></div>
                                </div>
                                <div class="loc-actions">
                                    <button id="useMe" class="ghost-btn">Use my position</button>
                                    <button id="useWp" class="ghost-btn">Use waypoint</button>
                                </div>
                            </div>

                            <div class="field-row">
                                <div class="field">
                                    <label>Scale <span id="scaleVal" class="muted">0.80</span></label>
                                    <input id="f-scale" type="range" min="0.1" max="2" step="0.05" value="0.8" />
                                </div>
                                <div class="field field--toggle">
                                    <label>Short range</label>
                                    <label class="switch">
                                        <input id="f-short" type="checkbox" />
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>

                            <div class="field">
                                <label>Color <span id="colorVal" class="muted">#0</span></label>
                                <div id="colorPalette" class="palette"></div>
                                <input id="f-color" type="number" min="0" max="85" value="0" class="manual-id" placeholder="or type id 0-85" />
                            </div>

                            <div class="actions">
                                <button id="saveBtn" class="primary-btn">Create blip</button>
                                <button id="cancelEdit" class="ghost-btn hidden">Cancel edit</button>
                            </div>
                        </div>

                        <!-- Right: sprite picker -->
                        <div class="sprite-col">
                            <div class="sprite-head">
                                <div class="search">
                                    <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                                    <input id="spriteSearch" type="text" placeholder="Search sprite by name or id…" />
                                </div>
                                <div class="selected-sprite">
                                    <span class="muted">Selected</span>
                                    <div id="selectedSpriteBox" class="sprite-chip"><span class="sprite-thumb" data-id="1"></span><b id="selSpriteId">1</b></div>
                                </div>
                            </div>
                            <div id="catChips" class="cat-chips"></div>
                            <div id="spriteGrid" class="sprite-grid"></div>
                        </div>
                    </div>
                </section>

                <!-- ───────── MANAGE TAB ───────── -->
                <section id="tab-manage" class="tabpane">
                    <div class="manage-head">
                        <div class="search search--wide">
                            <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                            <input id="manageSearch" type="text" placeholder="Search saved blips…" />
                        </div>
                    </div>
                    <div id="blipList" class="blip-list"></div>
                    <div id="emptyState" class="empty">
                        <svg viewBox="0 0 24 24" width="40" height="40" fill="none"><path d="M12 2c-4.2 0-7.5 3.2-7.5 7.3 0 5 6.2 11.7 7 12.5.3.3.7.3 1 0 .8-.8 7-7.5 7-12.5C19.5 5.2 16.2 2 12 2z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="9.4" r="2.6" stroke="currentColor" stroke-width="1.5"/></svg>
                        <p>No blips yet. Create your first one.</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="blips_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
